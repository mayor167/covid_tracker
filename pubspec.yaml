name: covid_tracker
description: "COVID-19 Dashboard & Tracker - Displays real-time global COVID-19 statistics with interactive charts."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking - HTTP client for API calls to disease.sh
  http: ^1.1.0

  # Date formatting - Used for chart axis labels and timestamps
  intl: ^0.18.1

  # State Management - GetX for reactive state, DI, and routing
  get: ^4.6.6

  # Charts - Line chart and donut/pie chart rendering
  fl_chart: ^0.63.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Build tools - Launcher icon and splash screen generators
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/ehealth_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logos/ehealth_logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/logos/ehealth_logo.png"
  windows:
    generate: true
    image_path: "assets/logos/ehealth_logo.png"
  macos:
    generate: true
    image_path: "assets/logos/ehealth_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logos/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800
